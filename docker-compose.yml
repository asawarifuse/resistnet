version: '3.8'

services:
  api:
    build: .
    container_name: resistnet-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: resistnet-frontend
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped